<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        button {
            background-color: #0078d7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #005bb5;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }

        footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My GitHub Website</h1>

        <p>This website is hosted using GitHub Pages.</p>

        <button onclick="showMessage()">Click Me</button>

        <div id="message"></div>

        <footer>
            Created with HTML, CSS & JavaScript
        </footer>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "🎉 Hello! Your website is running successfully on GitHub Pages.";
        }
    </script>

</body>
</html>
